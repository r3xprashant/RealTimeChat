<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Chat | Real-Time Messaging</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle">Login to start chatting</p>
            </div>
            <form id="auth-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="auth-submit-btn">Login</button>
            </form>
            <div class="auth-footer">
                <p id="auth-toggle-text">Don't have an account? <a href="#" id="auth-toggle">Sign Up</a></p>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar for Contacts -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <h2>Chats</h2>
                <div class="user-profile">
                    <span id="my-username">Me</span>
                    <button id="logout-btn">Logout</button>
                </div>
            </header>
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Search or start new chat">
            </div>
            <ul id="user-list" class="user-list">
                <!-- Users will be populated here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <h2>Stellar Chat</h2>
                <div class="status-indicator">
                    <span class="dot pulse"></span>
                    <span>Server: Port 5500</span>
                </div>
            </div>
            <div class="header-icons">
                <!-- Placeholder for profile or settings -->
                <div class="avatar">SC</div>
            </div>
        </header>
        <div class="messages-area" id="messages-container">
            <ul id="messages">
                <!-- Messages will appear here dynamically -->
                <li class="system">🚀 Welcome to Stellar Chat. Start talking!</li>
            </ul>
        </div>
        <div id="typing-indicator" class="typing-indicator"></div>

        <form onsubmit="sendMessage(event)" class="input-area">
            <input id="input" autocomplete="off" placeholder="Type a message..." />
            <button id="send-btn" type="submit">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                    <path d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"></path>
                </svg>
            </button>
        </form>
        </main>
    </div>

    <!-- Fix: Using relative path from the Express server -->
    <!-- Using Socket.io CDN for Vercel serverless compatibility -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
